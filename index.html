<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f62fe" />
    <meta name="description" content="Personal pelvic floor trainer" />
    <link rel="manifest" href="/manifest.json" />
    <title>KegelCoach</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden form for Netlify Forms detection at build time -->
    <form name="feedback" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <select name="role"><option value="user">User</option></select>
      <textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
