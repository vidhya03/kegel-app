<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f62fe" />
    <meta name="description" content="Free structured pelvic floor trainer — 4-week program with real-time timer, sound cues, and progress tracking" />

    <!-- Open Graph / WhatsApp / iMessage / LinkedIn share -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kegel.labkit.in/" />
    <meta property="og:title" content="KegelCoach — Free Pelvic Floor Trainer" />
    <meta property="og:description" content="Free structured pelvic floor trainer. 4-week program, real-time timer, sound cues, progress tracking. No app store needed — works on any phone." />
    <meta property="og:image" content="https://kegel.labkit.in/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://kegel.labkit.in/" />
    <meta name="twitter:title" content="KegelCoach — Free Pelvic Floor Trainer" />
    <meta name="twitter:description" content="Free structured pelvic floor trainer. 4-week program, guided squeeze/release timer, sound cues, progress tracking. No app store needed." />
    <meta name="twitter:image" content="https://kegel.labkit.in/og-image.png" />

    <link rel="manifest" href="/manifest.json" />
    <title>KegelCoach</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden form for Netlify Forms detection at build time -->
    <form name="feedback" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <select name="role"><option value="user">User</option></select>
      <textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
