<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#161616"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#0f62fe"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#262626" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#262626" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#262626" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#262626" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="80" height="80" fill="#0f62fe"/>
  <text x="120" y="140" font-size="52" text-anchor="middle" fill="#ffffff" font-family="monospace" font-weight="bold">K</text>

  <!-- App name -->
  <text x="80" y="240" font-size="72" fill="#f4f4f4" font-family="monospace" font-weight="bold">KegelCoach</text>

  <!-- Tagline -->
  <text x="80" y="310" font-size="32" fill="#c6c6c6" font-family="sans-serif">Free structured pelvic floor trainer</text>

  <!-- Divider -->
  <rect x="80" y="350" width="120" height="4" fill="#0f62fe"/>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="80" y="390" width="220" height="48" fill="#262626" rx="0"/>
  <text x="190" y="421" font-size="22" text-anchor="middle" fill="#f4f4f4" font-family="sans-serif">4-Week Program</text>

  <!-- Pill 2 -->
  <rect x="316" y="390" width="210" height="48" fill="#262626" rx="0"/>
  <text x="421" y="421" font-size="22" text-anchor="middle" fill="#f4f4f4" font-family="sans-serif">Real-time Timer</text>

  <!-- Pill 3 -->
  <rect x="542" y="390" width="180" height="48" fill="#262626" rx="0"/>
  <text x="632" y="421" font-size="22" text-anchor="middle" fill="#f4f4f4" font-family="sans-serif">100% Free</text>

  <!-- Pill 4 -->
  <rect x="738" y="390" width="200" height="48" fill="#262626" rx="0"/>
  <text x="838" y="421" font-size="22" text-anchor="middle" fill="#f4f4f4" font-family="sans-serif">PWA · No Install</text>

  <!-- Timer ring illustration (right side) -->
  <circle cx="980" cy="240" r="160" fill="none" stroke="#262626" stroke-width="18"/>
  <circle cx="980" cy="240" r="160" fill="none" stroke="#0f62fe" stroke-width="18"
    stroke-dasharray="670" stroke-dashoffset="200"
    transform="rotate(-90 980 240)"/>
  <text x="980" y="220" font-size="64" text-anchor="middle" fill="#f4f4f4" font-family="monospace" font-weight="bold">8</text>
  <text x="980" y="272" font-size="24" text-anchor="middle" fill="#0f62fe" font-family="sans-serif" font-weight="bold">SQUEEZE</text>

  <!-- URL -->
  <text x="80" y="570" font-size="28" fill="#525252" font-family="monospace">kegel.labkit.in</text>

  <!-- Open source badge -->
  <rect x="900" y="548" width="220" height="44" fill="#0f62fe"/>
  <text x="1010" y="576" font-size="22" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-weight="bold">Open Source</text>
</svg>
